{% extends 'base.html' %}
{% block title %}Login | SuitabilityDesk{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card"><div class="card-body">
<h1>Login</h1>
<form method="post">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary" type="submit">Login</button></form>
<p class="mt-3"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
</div></div></div></div>
{% endblock %}
